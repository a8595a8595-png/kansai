<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 關西深度之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F5F5F3; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // 從全域 lucide 物件解構圖示 (CDN 版用法)
        const { 
            Map, Info, Receipt, ListChecks, Train, Plane, Hotel, MapPin, Clock, 
            Cloud, Plus, Trash2, ExternalLink, RefreshCw, QrCode, X, 
            ImageIcon, Phone, Link2, TrendingUp, Flower2, Zap, Bus, 
            Footprints, ClipboardCheck, Ticket, Circle, CheckCircle2
        } = lucide.icons;

        const SUPABASE_URL = 'https://fcoldniwdpoercogqrrq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pfFfXYbrqX3RQzf9dhPFdQ_rvIIksZn'; // 已補上 n 

        const INITIAL_TRIP_DATA = {
            title: "2026 關西深度之旅",
            itinerary: [
                { day: 1, date: "04/06", title: "花蓮 ➔ 台北 ➔ 關西機場", location: "泉佐野", events: [
                    { id: 101, time: "12:18", type: "transport", title: "花蓮火車站", description: "台鐵 417 次 (EMU3000)" },
                    { id: 104, time: "18:15", type: "flight", title: "✈️ 樂桃 MM028 起飛", description: "桃園機場 T1" },
                    { id: 106, time: "23:00", type: "task", title: "領取 JR PASS & 指定席券", description: "尋找綠色售票機 (地球儀標示)", tag: "#重要任務" }
                ]},
                { day: 2, date: "04/07", title: "直奔天橋立 & 伊根", location: "伊根", events: [
                    { id: 203, time: "06:31", type: "transport", title: "特急 HARUKA 2號", description: "關西機場 ➔ 京都", tag: "#指定席券①" },
                    { id: 205, time: "08:38", type: "transport", title: "特急 Hashidate 1號", description: "京都 ➔ 天橋立", tag: "#指定席券②" }
                ]},
                { day: 3, date: "04/08", title: "天橋立 ➔ 美山", location: "美山", events: [
                    { id: 302, time: "09:50", type: "transport", title: "特急 Hashidate 2號", description: "天橋立 ➔ 園部", tag: "#指定席券③" },
                    { id: 306, time: "12:10", type: "transport", title: "南丹市營巴士", description: "日吉站前上車 (投幣 ¥600)" }
                ]},
                { day: 4, date: "04/09", title: "美山 ➔ 嵐山 ➔ 大津", location: "大津", events: [
                    { id: 405, time: "12:16", type: "transport", title: "JR 普通車 (往京都)", description: "園部 ➜ 馬堀", tag: "#關鍵轉乘" },
                    { id: 407, time: "13:30", type: "transport", title: "🚂 嵐山小火車", description: "小火車龜岡站 ➔ 小火車嵐山站", tag: "#已預約", ticket_url: "https://linkt.to/Ucou23Mw" }
                ]}
            ]
        };

        const IconRenderer = ({ icon: Icon, size = 16, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const svg = Icon.toSvg({ size, class: className });
                    iconRef.current.innerHTML = svg;
                }
            }, [Icon, size, className]);
            return <span ref={iconRef} className="inline-block" />;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('itinerary');
            const [selectedDay, setSelectedDay] = useState(1);
            
            const currentDayData = INITIAL_TRIP_DATA.itinerary.find(d => d.day === selectedDay) || INITIAL_TRIP_DATA.itinerary[0];

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#F5F5F3] pb-24 shadow-2xl relative">
                    {/* Header */}
                    <div className="bg-white p-6 sticky top-0 z-50 border-b flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-black text-stone-800">{INITIAL_TRIP_DATA.title}</h1>
                            <p className="text-[10px] text-[#557A66] font-bold">2026.04.06 - 04.11</p>
                        </div>
                    </div>

                    <main className="p-4">
                        {activeTab === 'itinerary' && (
                            <div className="animate-in fade-in duration-500">
                                <div className="flex space-x-2 overflow-x-auto no-scrollbar mb-6">
                                    {[1,2,3,4,5,6].map(d => (
                                        <button key={d} onClick={() => setSelectedDay(d)} className={`px-5 py-2 rounded-full text-xs font-black shrink-0 transition-all ${selectedDay === d ? 'bg-stone-800 text-white shadow-lg' : 'bg-white text-stone-400'}`}>Day {d}</button>
                                    ))}
                                </div>

                                <div className="relative pl-6 border-l-2 border-stone-200 ml-2">
                                    {currentDayData.events.map((ev, idx) => (
                                        <div key={idx} className="mb-8 relative">
                                            <div className="absolute -left-[33px] top-1 w-4 h-4 rounded-full bg-white border-4 border-stone-800"></div>
                                            <div className="flex items-center space-x-2 mb-1">
                                                <span className="text-[10px] font-bold text-stone-400">{ev.time}</span>
                                                <h3 className="font-black text-stone-800">{ev.title}</h3>
                                            </div>
                                            <p className="text-sm text-stone-500">{ev.desc || ev.description}</p>
                                            {ev.tag && <span className="inline-block mt-1 text-[10px] bg-rose-50 text-rose-500 px-2 py-0.5 rounded border border-rose-100">{ev.tag}</span>}
                                            {ev.ticket_url && (
                                                <a href={ev.ticket_url} target="_blank" className="mt-3 flex items-center justify-center space-x-2 w-full py-3 bg-rose-600 text-white rounded-xl font-black text-sm">
                                                    <IconRenderer icon={Ticket} size={16} /> <span>🎫 查看當天票券</span>
                                                </a>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="space-y-4 animate-in slide-in-from-bottom">
                                <a href="https://weathernews.jp/sakura/area/kinki/" target="_blank" className="block p-5 bg-pink-50 rounded-2xl border border-pink-100 text-pink-600 font-black flex justify-between">🌸 櫻花即時情報 <span>➜</span></a>
                                <a href="https://platinumaps.jp/d/kyoto-station-smart-navi?culture=zh-tw&gm=187&floor=1F" target="_blank" className="block p-5 bg-blue-50 rounded-2xl border border-blue-100 text-blue-600 font-black flex justify-between">🛅 京都站行李櫃空位 <span>➜</span></a>
                            </div>
                        )}
                    </main>

                    {/* Bottom Tab Bar */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t px-8 py-4 flex justify-between items-center shadow-inner">
                        <TabBtn id="itinerary" icon={Map} label="行程" active={activeTab} set={setActiveTab} />
                        <TabBtn id="info" icon={Info} label="資訊" active={activeTab} set={setActiveTab} />
                        <TabBtn id="expenses" icon={Receipt} label="記帳" active={activeTab} set={setActiveTab} />
                        <TabBtn id="checklist" icon={ListChecks} label="清單" active={activeTab} set={setActiveTab} />
                    </div>
                </div>
            );
        }

        function TabBtn({ id, icon, label, active, set }) {
            return (
                <button onClick={() => set(id)} className={`flex flex-col items-center space-y-1 transition-all ${active === id ? 'text-stone-800' : 'text-stone-300'}`}>
                    <IconRenderer icon={icon} size={24} />
                    <span className="text-[10px] font-black uppercase">{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
