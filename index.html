            // --- 主程式 Layout ---
            function App() {
              const [activeTab, setActiveTab] = useState('itinerary');
              const [tripData, setTripData] = useState(INITIAL_TRIP_DATA);
              const [expenses, setExpenses] = useState([]);
              const [checklist, setChecklist] = useState([]);
              const [isSyncing, setIsSyncing] = useState(false);
              const [lastSynced, setLastSynced] = useState(null);
              const [supabaseClient, setSupabaseClient] = useState(null);

              useEffect(() => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
                script.onload = () => { if (window.supabase) setSupabaseClient(window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)); };
                document.head.appendChild(script);
                
                const cachedExp = localStorage.getItem('kansai_final_exp');
                const cachedCheck = localStorage.getItem('kansai_final_check');
                const cachedTrip = localStorage.getItem('kansai_final_trip');
                if (cachedExp) setExpenses(JSON.parse(cachedExp));
                if (cachedCheck) setChecklist(JSON.parse(cachedCheck)); else setChecklist(INITIAL_CHECKLIST);
                if (cachedTrip) setTripData(JSON.parse(cachedTrip));
              }, []);

              useEffect(() => {
                if (!supabaseClient) return;
                const load = async () => {
                  const { data } = await supabaseClient.from('trips').select('trip_data').eq('id', 1).maybeSingle();
                  if (data?.trip_data) {
                    const d = data.trip_data;
                    if (d.expenses) setExpenses(d.expenses);
                    if (d.checklist) setChecklist(d.checklist);
                    if (d.itinerary) setTripData(d.itinerary);
                    setLastSynced(new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }));
                  }
                };
                load();
              }, [supabaseClient]);

              useEffect(() => {
                localStorage.setItem('kansai_final_exp', JSON.stringify(expenses));
                localStorage.setItem('kansai_final_check', JSON.stringify(checklist));
                localStorage.setItem('kansai_final_trip', JSON.stringify(tripData));
              }, [expenses, checklist, tripData]);

              const syncData = async () => {
                if (!supabaseClient) return;
                setIsSyncing(true);
                try {
                  await supabaseClient.from('trips').upsert({ id: 1, trip_data: { itinerary: tripData, expenses, checklist } });
                  setLastSynced(new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }));
                } catch (e) { console.error(e); }
                setIsSyncing(false);
              };

              const tabs = [
                { id: 'itinerary', icon: MapIcon, label: '行程' },
                { id: 'info', icon: Info, label: '資訊' },
                { id: 'expenses', icon: Receipt, label: '記帳' },
                { id: 'checklist', icon: ListChecks, label: '清單' },
              ];

              return (
                <div className="max-w-md mx-auto h-screen bg-black sm:py-6 overflow-hidden relative font-sans antialiased text-stone-800">
                  <div className="w-full h-full bg-[#F5F5F3] flex flex-col relative sm:rounded-[3.5rem] overflow-hidden border-8 border-black shadow-2xl">
                    {activeTab === 'itinerary' && <ItineraryTab tripData={tripData} syncData={syncData} isSyncing={isSyncing} lastSynced={lastSynced} />}
                    {activeTab === 'info' && <InfoTab tripData={tripData} updateVouchers={(v) => setTripData({...tripData, vouchers: v})} />}
                    {activeTab === 'expenses' && <ExpenseTab expenses={expenses} setExpenses={setExpenses} />}
                    {activeTab === 'checklist' && <ChecklistTab checklist={checklist} setChecklist={setChecklist} />}

                    <div className="absolute bottom-0 w-full bg-white/95 backdrop-blur-2xl border-t border-stone-100 px-8 py-5 flex justify-between items-center pb-8">
                      {tabs.map(tab => {
                        const Icon = tab.icon;
                        const isActive = activeTab === tab.id;
                        return (
                          <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center w-14 transition-all duration-300 active:scale-75 ${isActive ? 'text-[#557A66]' : 'text-stone-300'}`}>
                            <Icon size={isActive ? 28 : 24} strokeWidth={isActive ? 3 : 2} />
                            <span className={`text-[10px] mt-2 font-black uppercase tracking-tighter ${isActive ? 'opacity-100' : 'opacity-30'}`}>{tab.label}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  <style dangerouslySetInnerHTML={{__html: `
                    .no-scrollbar::-webkit-scrollbar { display: none; }
                    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
                    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 2rem); }
                    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
                    body { font-family: 'Noto Sans TC', sans-serif; }
                  `}} />
                </div>
              );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })(); 
    </script>
</body>
</html>
