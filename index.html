                                        <a key={i} href={`tel:${c.tel}`} className="flex justify-between items-center p-4 bg-rose-50 rounded-xl border border-rose-100 mb-2 active:bg-rose-100">
                                            <div><div className="text-sm font-black text-rose-700">{c.title}</div></div>
                                            <span className="text-xl">📞</span>
                                        </a>
                                    ))}
                                </section>
                            </div>
                        )}

                        {/* 💰 記帳分頁 */}
                        {activeTab === 'expenses' && (
                            <ExpenseTab expenses={expenses} setExpenses={setExpenses} />
                        )}

                        {/* ✅ 清單分頁 */}
                        {activeTab === 'checklist' && (
                            <ChecklistTab checklist={checklist} setChecklist={setChecklist} />
                        )}
                    </main>

                    {/* 底部導航 */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t px-6 py-4 flex justify-between items-center shadow-inner z-50">
                        <TabBtn id="info" icon={Icons.Info} label="資訊" active={activeTab} set={setActiveTab} />
                        <TabBtn id="itinerary" icon={Icons.Map} label="行程" active={activeTab} set={setActiveTab} />
                        <TabBtn id="expenses" icon={Icons.Receipt} label="記帳" active={activeTab} set={setActiveTab} />
                        <TabBtn id="checklist" icon={Icons.Checklist} label="清單" active={activeTab} set={setActiveTab} />
                    </div>
                </div>
            );
        }

        function ExpenseTab({ expenses, setExpenses }) {
            const [amount, setAmount] = useState('');
            const [category, setCategory] = useState('飲食');
            const [note, setNote] = useState('');

            const handleAdd = (e) => {
                e.preventDefault();
                if (!amount) return;
                const newExp = { id: Date.now(), amount: parseFloat(amount), category, note };
                setExpenses([newExp, ...expenses]);
                setAmount(''); setNote('');
            };
            const totalJPY = expenses.reduce((sum, e) => sum + e.amount, 0);
            const totalTWD = (totalJPY * 0.21).toFixed(0);

            return (
                <div className="animate-in fade-in duration-300">
                    <div className="bg-[#557A66] p-6 rounded-3xl text-white shadow-lg mb-6 text-center">
                        <div className="text-xs font-black opacity-70 uppercase tracking-widest mb-1">Total Expenses</div>
                        <div className="text-4xl font-black mb-1">¥ {totalJPY.toLocaleString()}</div>
                        <div className="text-sm font-bold opacity-80">≈ NT$ {totalTWD.toLocaleString()}</div>
                    </div>
                    <form onSubmit={handleAdd} className="bg-white p-5 rounded-3xl shadow-sm border border-stone-100 mb-6">
                        <div className="flex space-x-2 mb-3">
                            <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="日幣 (¥)" className="flex-1 bg-stone-50 p-3 rounded-xl font-bold outline-none" />
                            <select value={category} onChange={e => setCategory(e.target.value)} className="bg-stone-50 p-3 rounded-xl font-bold outline-none"><option>飲食</option><option>交通</option><option>購物</option><option>住宿</option></select>
                        </div>
                        <div className="flex space-x-2">
                            <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="備註 (選填)" className="flex-1 bg-stone-50 p-3 rounded-xl font-bold outline-none" />
                            <button type="submit" className="bg-[#557A66] text-white px-5 py-3 rounded-xl font-black shadow-md">+</button>
                        </div>
                    </form>
                    <div className="space-y-3">
                        {expenses.map(exp => (
                            <div key={exp.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-stone-50">
                                <div>
                                    <div className="text-sm font-black">{exp.note || exp.category}</div>
                                    <div className="text-[10px] text-stone-400 font-bold bg-stone-100 inline-block px-2 py-0.5 rounded mt-1">{exp.category}</div>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <span className="font-black">¥{exp.amount}</span>
                                    <button onClick={() => setExpenses(expenses.filter(e => e.id !== exp.id))} className="text-stone-300 hover:text-rose-500"><Icons.Trash /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ChecklistTab({ checklist, setChecklist }) {
            const [newItem, setNewItem] = useState('');
            const toggle = (id) => setChecklist(checklist.map(t => t.id === id ? { ...t, checked: !t.checked } : t));
            const remove = (id) => setChecklist(checklist.filter(t => t.id !== id));
            const add = () => { if(newItem) { setChecklist([...checklist, {id: Date.now(), text: newItem, checked: false}]); setNewItem(''); } };

            return (
                <div className="animate-in fade-in duration-300">
                    <div className="flex space-x-2 mb-6">
                        <input type="text" value={newItem} onChange={e => setNewItem(e.target.value)} placeholder="新增行李..." className="flex-1 bg-white p-4 rounded-2xl font-bold outline-none shadow-sm border border-stone-100" />
                        <button onClick={add} className="bg-stone-800 text-white px-6 rounded-2xl font-black shadow-md">+</button>
                    </div>
                    <div className="bg-white rounded-3xl shadow-sm border border-stone-100 overflow-hidden">
                        {checklist.map((item, idx) => (
                            <div key={item.id} className={`flex items-center p-4 ${idx !== checklist.length-1 ? 'border-b border-stone-50' : ''}`}>
                                <button onClick={() => toggle(item.id)} className={`flex-1 text-left font-bold text-[15px] transition-all ${item.checked ? 'text-stone-300 line-through' : 'text-stone-700'}`}>
                                    {item.checked ? '✅ ' : '⬜ '}{item.text}
                                </button>
                                <button onClick={() => remove(item.id)} className="text-stone-200 hover:text-rose-500 p-2"><Icons.Trash /></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function TabBtn({ id, icon: Icon, label, active, set }) {
            const isActive = active === id;
            return (
                <button onClick={() => set(id)} className={`flex flex-col items-center space-y-1 w-16 transition-all ${isActive ? 'text-[#557A66]' : 'text-stone-300 active:scale-90'}`}>
                    <Icon />
                    <span className={`text-[10px] font-black uppercase ${isActive ? 'opacity-100' : 'opacity-50'}`}>{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
